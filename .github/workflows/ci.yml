name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app:
    name: App and browser
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          cache: npm
          node-version: 22.23.1
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run verify
      - run: npm audit --audit-level=moderate

  sql:
    name: ClickHouse smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: clickhouse/clickhouse-server:26.6.2.81@sha256:140f3f799480b4b5c53c35333398ed76598fcdb546b3e2fd64f582b075a64adc
      options: --user 0
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Verify schema, seed, and analysis invariants
        run: clickhouse local --queries-file db/schema.sql db/seed.sql db/smoke.sql
